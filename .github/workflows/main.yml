name: Run Windows RDP

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Configure Windows User and RDP
        shell: powershell
        run: |
          $Password = ConvertTo-SecureString "WindowsPassword123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Set-Service -Name "TermService" -StartupType Automatic
          Start-Service -Name "TermService"

      - name: Launch Tunnel and Connect
        shell: powershell
        run: |
          # تم استبدال -T بـ -t لتفعيل ميزة الـ TTY التفاعلية لتجبر السيرفر على إظهار الرابط فوراً دون أي حجز للذاكرة
          # تم تغيير المخدم إلى المخدم الرئيسي الرسمي المستقر a.pinggy.io
          Start-Process -FilePath "cmd.exe" -ArgumentList "/c ssh -t -p 443 -o StrictHostKeyChecking=no -o UserKnownHostsFile=NUL -o ServerAliveInterval=30 -R 0:127.0.0.1:3389 tcp@a.pinggy.io > pinggy.log 2> pinggy_err.log" -WindowStyle Hidden
          
          # حلقة فحص متطورة تبحث في السجل كل ثانيتين وتلتقط الرابط فوراً
          $tcp_line = $null
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep -Seconds 2
              $log = Get-Content -Path "pinggy.log" -ErrorAction SilentlyContinue
              $tcp_line = $log | Select-String -Pattern "tcp://[a-zA-Z0-9.-]+:[0-9]+" | ForEach-Object { $_.Matches.Value }
              if ($tcp_line) {
                  break
              }
          }

          if ($tcp_line) {
              $tcp_clean = $tcp_line -replace "tcp://", ""
              Write-Output "========================================================"
              Write-Output "SUCCESS: Windows Server is ready for remote connection!"
              Write-Output "========================================================"
              Write-Output "Connection details for your RDP Client (PC or Mobile):"
              Write-Output "   - Computer Address: $tcp_clean"
              Write-Output "   - Username: runneradmin"
              Write-Output "   - Password: WindowsPassword123!"
              Write-Output "========================================================"
          } else {
              Write-Output "ERROR: Failed to automatically fetch connection address."
              Write-Output "Dump of pinggy.log:"
              Get-Content -Path "pinggy.log" -ErrorAction SilentlyContinue
              Write-Output "Dump of pinggy_err.log:"
              Get-Content -Path "pinggy_err.log" -ErrorAction SilentlyContinue
          }

          Write-Output "Keeping Windows Server active..."
          Start-Sleep -Seconds 21600
